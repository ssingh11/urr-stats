services:
  - type: web
    name: urr-stats
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /data/urr_stats.db
    disk:
      name: urr-data
      mountPath: /data
      sizeGB: 1
